services:
  gw-a:
    build:
      context: .
      dockerfile: Dockerfile.runtime
    command:
      - sh
      - /app/docker/gateway-entrypoint.sh
      - /app/examples/gw-a.docker.toml
      - stn0
      - 10.20.0.0/24
    volumes:
      - ./examples:/app/examples:ro
      - ./keys:/app/keys:ro
      - ./docker:/app/docker:ro
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      lan_a:
        ipv4_address: 10.10.0.254
      transport:
        ipv4_address: 172.28.0.10
    restart: unless-stopped
    environment:
        RUST_LOG: debug
        RUST_BACKTRACE: "1"

  gw-b:
    build:
      context: .
      dockerfile: Dockerfile.runtime
    command:
      - sh
      - /app/docker/gateway-entrypoint.sh
      - /app/examples/gw-b.docker.toml
      - stn1
      - 10.10.0.0/24
    volumes:
      - ./examples:/app/examples:ro
      - ./keys:/app/keys:ro
      - ./docker:/app/docker:ro
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      lan_b:
        ipv4_address: 10.20.0.254
      transport:
        ipv4_address: 172.28.0.11
    restart: unless-stopped
    environment:
        RUST_LOG: debug
        RUST_BACKTRACE: "1"

  client:
    image: nicolaka/netshoot:latest
    command:
      - sh
      - -lc
      - |
        ip route replace 10.20.0.0/24 via 10.10.0.254 dev eth0
        sleep infinity
    cap_add:
      - NET_ADMIN
    networks:
      lan_a:
        ipv4_address: 10.10.0.10
    depends_on:
      - gw-a

  chat-a:
    image: python:3.12-alpine
    command:
      - sh
      - -lc
      - |
        apk add --no-cache iproute2 >/dev/null
        ip route replace 10.62.0.0/24 via 10.61.0.254 dev eth0
        sleep infinity
    cap_add:
      - NET_ADMIN
    stdin_open: true
    tty: true
    volumes:
      - ./chat:/app/chat:ro
    networks:
      lan_a:
        ipv4_address: 10.61.0.20
    depends_on:
      - gw-a

  web:
    image: python:3.12-alpine
    command:
      - sh
      - -lc
      - |
        apk add --no-cache iproute2 >/dev/null
        ip route replace 10.10.0.0/24 via 10.20.0.254 dev eth0
        mkdir -p /srv
        printf 'StealthNet demo web from 10.20.0.10\n' > /srv/index.html
        python3 -m http.server 8080 -d /srv
    cap_add:
      - NET_ADMIN
    networks:
      lan_b:
        ipv4_address: 10.20.0.10
    depends_on:
      - gw-b

  chat-b:
    image: python:3.12-alpine
    command:
      - sh
      - -lc
      - |
        apk add --no-cache iproute2 >/dev/null
        ip route replace 10.61.0.0/24 via 10.62.0.254 dev eth0
        sleep infinity
    cap_add:
      - NET_ADMIN
    stdin_open: true
    tty: true
    volumes:
      - ./chat:/app/chat:ro
    networks:
      lan_b:
        ipv4_address: 10.62.0.20
    depends_on:
      - gw-b

  sniffer:
    image: nicolaka/netshoot:latest
    command:
      - sh
      - -lc
      - |
        sleep infinity
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./captures:/captures
    networks:
      transport: {}

networks:
  lan_a:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/24

  lan_b:
    driver: bridge
    ipam:
      config:
        - subnet: 10.20.0.0/24

  transport:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
